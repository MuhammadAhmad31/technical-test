services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-runner
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
    environment:
      API_PORT: 3000
      API_PREFIX: api
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4173,http://127.0.0.1:4173,http://localhost:5173,http://127.0.0.1:5173}
      JWT_SECRET: technical-test-docker-secret
      JWT_EXPIRES_IN: 1h
      COOKIE_SECURE: "false"
      COOKIE_SAME_SITE: lax
      OAUTH_STATE_COOKIE_MAX_AGE_MS: 300000
      ACCESS_TOKEN_COOKIE_MAX_AGE_MS: 3600000
      RANDOM_USER_API_URL: https://randomuser.me/api/
      RANDOM_USER_API_SEED: technical-test
    ports:
      - "3000:3000"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web-runner
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
    depends_on:
      - api
    ports:
      - "4173:80"
